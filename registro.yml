name: Registro Garcibus

on:
  workflow_dispatch:  # Permite correrlo manualmente desde la app

jobs:
  registro:
    runs-on: ubuntu-latest
permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegador Playwright
        run: npx playwright install chromium --with-deps

      - name: Correr script de registro
        run: node registro.js

      - name: Guardar QR en el repo
        if: always()
        run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions"
          git add *.png *.jpg *.jpeg *.html 2>/dev/null || true
          git commit -m "QR generado automáticamente" || echo "Sin cambios"
          git push origin HEAD:principal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
